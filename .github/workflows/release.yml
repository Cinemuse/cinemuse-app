name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.0'

      - name: Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build Windows MSIX
        run: |
          flutter build windows --release
          dart run msix:create --display-name="Cinemuse" --publisher-display-name="Cinemuse" --identity-name="com.cinemuse.app" --publisher="CN=Cinemuse, O=Cinemuse, L=Rome, S=Lazio, C=IT" --install-certificate=false
          # The MSIX is created in build/windows/x64/runner/Release/
          # We rename it for the release artifact
          cd build/windows/x64/runner/Release
          move *.msix cinemuse-windows.msix

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk,build/windows/x64/runner/Release/cinemuse-windows.msix"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          commit: ${{ github.sha }}
