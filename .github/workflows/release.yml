name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.41.0'

      - name: Create .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Get dependencies
        run: flutter pub get

      - name: Parse version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart('v')
          if ($tag -match '^([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)$') {
            Write-Output "BUILD_NAME=$($Matches[1])" >> $env:GITHUB_OUTPUT
            Write-Output "BUILD_NUMBER=$($Matches[2])" >> $env:GITHUB_OUTPUT
          } elseif ($tag -match '^([0-9]+\.[0-9]+\.[0-9]+)$') {
            Write-Output "BUILD_NAME=$tag" >> $env:GITHUB_OUTPUT
            Write-Output "BUILD_NUMBER=1" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output "BUILD_NAME=" >> $env:GITHUB_OUTPUT
            Write-Output "BUILD_NUMBER=" >> $env:GITHUB_OUTPUT
          }

      - name: Build APK
        run: flutter build apk --release --split-per-abi --build-name="${{ steps.version.outputs.BUILD_NAME }}" --build-number="${{ steps.version.outputs.BUILD_NUMBER }}"

      - name: Rename APKs
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Get-ChildItem -Path build/app/outputs/flutter-apk/*.apk | ForEach-Object {
            $oldName = $_.Name
            $newName = $oldName.Replace("app-", "Cinemuse-$tag-")
            if ($oldName -ne $newName) {
              Write-Output "Renaming $oldName to $newName"
              Rename-Item $_.FullName $newName
            }
          }

      - name: Build Windows ZIP
        run: |
          flutter build windows --release --build-name="${{ steps.version.outputs.BUILD_NAME }}" --build-number="${{ steps.version.outputs.BUILD_NUMBER }}"
          # ZIP the entire Release folder using PowerShell
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath build/windows/x64/runner/Release/cinemuse-windows.zip

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/*.apk,build/windows/x64/runner/Release/cinemuse-windows.zip"
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          tag: ${{ github.ref_name }}
          commit: ${{ github.sha }}
